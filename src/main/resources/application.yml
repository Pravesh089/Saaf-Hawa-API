spring:
  application:
    name: saaf-hawa-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/saafhawa}
    username: ${DB_USER:saafhawa}
    password: ${DB_PASSWORD:saafhawa}
  jpa:
    hibernate:
      # Schema is owned by Flyway (docs/db-design.md); Hibernate never alters it.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true

saafhawa:
  contact-url: ${CONTACT_URL:https://github.com/pravesh089/saaf-hawa-api}
  admin-token: ${SAAFHAWA_ADMIN_TOKEN:}
  archive:
    type: ${ARCHIVE_TYPE:filesystem}      # filesystem | s3
    base-path: ${ARCHIVE_PATH:./data/archive}
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket: ${S3_BUCKET:saafhawa-raw}
  rate-limit:
    anonymous-per-hour: ${RATE_ANON_PER_HOUR:30}
    keyed-per-minute: ${RATE_KEYED_PER_MIN:60}
  alerting:
    consecutive-failure-threshold: ${ALERT_FAILURE_THRESHOLD:3}
    webhook-url: ${ALERT_WEBHOOK_URL:}
  ingest:
    datagovin:
      enabled: ${DATAGOVIN_ENABLED:true}
      base-url: ${DATAGOVIN_BASE_URL:https://api.data.gov.in/resource}
      resource-id: ${DATAGOVIN_RESOURCE_ID:3b01bcb8-0b14-4abf-b6f2-c1bfd384ba69}
      api-key: ${DATAGOVIN_API_KEY:}
      page-size: ${DATAGOVIN_PAGE_SIZE:1000}
      max-pages: ${DATAGOVIN_MAX_PAGES:20}
      cron: ${DATAGOVIN_CRON:0 5 * * * *}
    urbanemissions:
      enabled: ${URBANEMISSIONS_ENABLED:true}
      base-url: ${URBANEMISSIONS_BASE_URL:https://raw.githubusercontent.com/urbanemissionsinfo/AQI_bulletins/main/data/Processed}
      # Full back-catalogue (2015-2024), fetched only for an explicit historical backfill.
      history-files:
        - AllIndiaBulletins_Master_2024.csv
      # Current-year file(s) the weekly refresh keeps topped up.
      current-files:
        - AllIndiaBulletins_Master2025.csv
        - AllIndiaBulletins_2025.csv
      cron: ${URBANEMISSIONS_CRON:0 0 3 * * MON}
