# One-command dev environment (NFR-3): app + TimescaleDB/PostGIS + MinIO, with seeded demo data.
#   docker compose up --build
# Then: http://localhost:8080/docs  and  http://localhost:8080/v1/status
services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: saafhawa
      POSTGRES_USER: saafhawa
      POSTGRES_PASSWORD: saafhawa
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saafhawa -d saafhawa"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://db:5432/saafhawa
      DB_USER: saafhawa
      DB_PASSWORD: saafhawa
      ARCHIVE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: saafhawa-raw
      SAAFHAWA_ADMIN_TOKEN: ${SAAFHAWA_ADMIN_TOKEN:-dev-admin-token}
      DATAGOVIN_API_KEY: ${DATAGOVIN_API_KEY:-}
      # With no DATAGOVIN_API_KEY the scheduled poll fails gracefully and is logged;
      # the API still serves the seeded reference data and any backfilled fixtures.
    ports:
      - "8080:8080"

volumes:
  dbdata:
  miniodata:
